apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: versitygw
  labels:
    app.kubernetes.io/name: versitygw
    app.kubernetes.io/component: object-storage
spec:
  # Points at the ClusterIP Service in service.yaml. With a single replica
  # this is fine; if you ever scale beyond 1 replica, switch this to a
  # dedicated headless Service for stable per-pod DNS.
  serviceName: versitygw
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: versitygw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: versitygw
        app.kubernetes.io/component: object-storage
    spec:
      securityContext:
        # Ensures the Longhorn volume is group-writable regardless of which
        # uid the containers end up running as.
        fsGroup: 1000

      initContainers:
        # The posix backend treats top-level directories under the gateway
        # root as buckets. Create the "loki" bucket directory on first
        # start (idempotent - safe on every restart).
        - name: init-buckets
          image: busybox:1.36.1
          command:
            - sh
            - -c
            - mkdir -p /data/loki
          volumeMounts:
            - name: data
              mountPath: /data
      automountServiceAccountToken: false
      containers:
        - name: versitygw
          image: ghcr.io/versity/versitygw:v1.4.0
          args:
            - posix
            - /data
          ports:
            - name: s3
              containerPort: 7070
              protocol: TCP
          env:
            - name: ROOT_ACCESS_KEY
              value: "${LOKI_MINIO_USER}"
            - name: ROOT_SECRET_KEY
              value: "${LOKI_MINIO_PASS}"

          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            tcpSocket:
              port: s3
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: s3
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi

        # Real cron daemon (dcron) that periodically deletes objects from
        # the "loki" bucket once they exceed RETENTION_DAYS. Schedule and
        # retention window come from the versitygw-retention-config
        # ConfigMap, not the image - see retention-cron-image/.
#        - name: retention-cron
#          image: ghcr.io/REPLACE_ME/versitygw-retention-cron:1.0.0
#          volumeMounts:
#            - name: data
#              mountPath: /data
#            - name: retention-config
#              mountPath: /etc/cron-config
#              readOnly: true
#          resources:
#            requests:
#              cpu: 10m
#              memory: 32Mi
#            limits:
#              memory: 64Mi

      volumes:
        - name: retention-config
          configMap:
            name: versitygw-retention-config

  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: versitygw
          app.kubernetes.io/component: object-storage
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: longhorn
        resources:
          requests:
            storage: 40Gi
