# Configuration for the generic cron sidecar (see cron-image/).
#
# Both the crontab and the script it runs live here, so the schedule,
# retention window, and cleanup logic can all be changed by editing this
# ConfigMap and committing - no image rebuild required.
apiVersion: v1
kind: ConfigMap
metadata:
  name: versitygw-retention-config
  labels:
    app.kubernetes.io/name: versitygw
    app.kubernetes.io/component: retention-cron
data:
  # Installed as /etc/crontabs/root by the cron image's entrypoint.
  # "VAR=value" lines at the top are exported into the job's environment.
  crontab: |
    # min hour dom month dow  command
    0 3 * * *  /scripts/retention-cleanup.sh >> /proc/1/fd/1 2>&1

  # Copied to /scripts/retention-cleanup.sh and made executable by the
  # cron image's entrypoint.
  retention-cleanup.sh: |
    #!/bin/sh
    set -eu

    : "${BUCKET_PATH:=/data/loki}"
    : "${RETENTION_DAYS:=45}"

    echo "$(date -Iseconds) retention-cron: deleting objects older than ${RETENTION_DAYS}d under ${BUCKET_PATH}"

    # Delete files (S3 objects) older than RETENTION_DAYS.
    find "${BUCKET_PATH}" -type f -mtime "+${RETENTION_DAYS}" -print -delete

    # The POSIX backend represents S3 key prefixes as real directories -
    # clean up any that are now empty as a result of the deletions above.
    find "${BUCKET_PATH}" -mindepth 1 -type d -empty -delete

    echo "$(date -Iseconds) retention-cron: cleanup complete"
